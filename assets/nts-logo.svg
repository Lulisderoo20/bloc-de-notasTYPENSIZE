<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Logo NTS</title>
  <desc id="desc">Icono estilo bloc de notas con las letras NTS</desc>
  <defs>
